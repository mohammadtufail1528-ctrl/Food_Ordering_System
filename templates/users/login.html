{% extends 'base.html' %}
{% block title %}Login – Foodie{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-9 col-lg-7 col-xl-5">
        <div class="auth-card">

          <!-- Logo -->
          <div class="auth-logo text-center mb-4">
            <span class="fs-1">🍔</span>
            <h2 class="fw-bold mt-2">Welcome Back!</h2>
            <p class="text-muted">Login to continue ordering delicious food</p>
          </div>

          <form method="post" action="/users/login/" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <div class="input-group auth-input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group auth-input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Your password" required />
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="remember_me" id="rememberMe" />
                <label class="form-check-label" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-danger text-decoration-none small">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>

          <div class="auth-divider my-4"><span>or</span></div>

          <p class="text-center mb-0">
            Don't have an account?
            <a href="/users/signup/" class="text-danger fw-semibold text-decoration-none">Sign Up Free</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { input.type = 'password'; icon.className = 'bi bi-eye'; }
}
</script>
{% endblock %}
