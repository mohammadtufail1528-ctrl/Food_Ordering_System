{% extends 'base.html' %}
{% block title %}Sign Up – Foodie{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-80">
      <div class="col-md-9 col-lg-7 col-xl-6">
        <div class="auth-card">

          <div class="auth-logo text-center mb-4">
            <span class="fs-1">🍔</span>
            <h2 class="fw-bold mt-2">Create Account</h2>
            <p class="text-muted">Join Foodie and get your first order at 50% off!</p>
          </div>

          <form method="post" action="/users/signup/" novalidate>
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                <div class="input-group auth-input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" name="first_name" class="form-control" placeholder="First name" required />
                </div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" name="last_name" class="form-control rounded-3" placeholder="Last name" />
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                <div class="input-group auth-input-group">
                  <span class="input-group-text"><i class="bi bi-at"></i></span>
                  <input type="text" name="username" class="form-control" placeholder="Choose a username" required />
                </div>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                <div class="input-group auth-input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="email" class="form-control" placeholder="your@email.com" required />
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                <div class="input-group auth-input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" name="password1" id="pw1" class="form-control" placeholder="Min 8 chars" required />
                </div>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
                <div class="input-group auth-input-group">
                  <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" name="password2" id="pw2" class="form-control" placeholder="Repeat password" required />
                </div>
              </div>
            </div>

            <!-- Password strength -->
            <div class="password-strength mt-2" id="strengthBar" style="display:none;">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <small class="text-muted" id="strengthText"></small>

            <div class="form-check mt-3 mb-4">
              <input class="form-check-input" type="checkbox" id="termsCheck" required />
              <label class="form-check-label" for="termsCheck">
                I agree to the <a href="#" class="text-danger">Terms of Service</a> and <a href="#" class="text-danger">Privacy Policy</a>
              </label>
            </div>

            <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-semibold">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </form>

          <div class="auth-divider my-4"><span>or</span></div>
          <p class="text-center mb-0">
            Already have an account?
            <a href="/users/login/" class="text-danger fw-semibold text-decoration-none">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('pw1').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('strengthBar');
  const fill = document.getElementById('strengthFill');
  const txt = document.getElementById('strengthText');
  if (!val) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  let strength = 0;
  if (val.length >= 8) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  const levels = [
    { w: '25%', color: '#dc3545', label: 'Weak' },
    { w: '50%', color: '#fd7e14', label: 'Fair' },
    { w: '75%', color: '#ffc107', label: 'Good' },
    { w: '100%', color: '#198754', label: 'Strong' },
  ];
  const l = levels[strength - 1] || levels[0];
  fill.style.width = l.w;
  fill.style.background = l.color;
  txt.textContent = `Password strength: ${l.label}`;
  txt.style.color = l.color;
});
</script>
{% endblock %}
